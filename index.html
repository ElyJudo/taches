<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP - Liste de Tâches</title>
    <link rel="stylesheet" href="css/style.css">
    
</head>
<body>

    <div class="change" id="modal-modifier">
        <div>
            <h2>Modifier la tâche</h2>
            <div  class="box-btn">
                <input type="text"  id="input-txt">
                <div>
                    <button class="btn-annuler" id="btn-annuler">Annuler</button>
                    <button id="btn-ok">Modifier</button>
                </div>
            </div>
        </div>
    </div>
    <div class="container">
        <h1>Mes Tâches</h1>
        <div class="input-group">
            <input type="text" id="task-input" placeholder="Quelle tâche faire ?">
            <button id="add-btn">Ajouter</button>
        </div>
        <ul id="task-list">
            <!-- Asehoy eto amin’ny alalan’ny JS. -->
        </ul>
    </div>
    
    <script src="js/script.js"></script>
</body>
</html>
